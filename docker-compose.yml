name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Local Opt
    runs-on: self-hosted

    steps:
      # 1. Baixa o código na pasta padrão do runner (~/actions-runner/_work/...)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Sincroniza os arquivos da pasta do runner para o /opt
      - name: Sync files to /opt
        run: |
          # O rsyc copia apenas o que mudou e ignora a pasta .git para ficar leve
          sudo rsync -av --delete --exclude '.git' . /opt/jubilant-fishstick/

      # 3. Roda o Docker na pasta final
      - name: Build and Restart Containers
        working-directory: /opt/jubilant-fishstick
        run: |
          set -e
          docker compose up -d --build
          docker image prune -f