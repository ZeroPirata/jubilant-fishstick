name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Local Opt
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync files to /opt
        run: |
          sudo rsync -av --delete --exclude '.git' ./ /opt/jubilant-fishstick/

      - name: Build and Restart Containers
        working-directory: /opt/jubilant-fishstick
        run: |
          set -e
          docker compose up -d --build
          docker image prune -f