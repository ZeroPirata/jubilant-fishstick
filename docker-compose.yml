services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - OUTPUT_DIR=/app/storage
    ports:
      - "127.0.0.1:${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"
    volumes:
      - ./data/storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - db-network
      - cache-network
    mem_limit: 2g
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass}
      POSTGRES_DB: ${POSTGRES_DB:-desafio_db}
    volumes:
      - db_data::/var/lib/postgresql/data
      - ./repository/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    networks:
      - db-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-desafio_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 512m
    security_opt:
      - no-new-privileges:true

  cache:
    image: redis:7-alpine
    restart: always
    volumes:
      - cache_data:/data
    networks:
      - cache-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
    mem_limit: 256m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

networks:
  db-network:
    driver: bridge
    internal: true
  cache-network:
    driver: bridge
    internal: true

volumes:
  db_data:
  cache_data: