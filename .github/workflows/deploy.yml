name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: |
          GO_VERSION=$(grep '^go ' go.mod | awk '{print $2}')
          docker run --rm \
            -v "$(pwd):/app" \
            -w /app \
            "golang:${GO_VERSION}-alpine" \
            go test ./... -count=1 -timeout 60s

  deploy:
    name: Deploy to server
    runs-on: self-hosted
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Sync files to /opt
        run: |
          rsync -av --delete \
            --exclude '.git' \
            --exclude '.env' \
            --exclude 'data/' \
            ./ /opt/jubilant-fishstick/

      - name: Build and restart containers
        working-directory: /opt/jubilant-fishstick
        run: |
          set -e
          docker compose up -d --build --remove-orphans
          docker image prune -f

      - name: Wait for healthcheck
        working-directory: /opt/jubilant-fishstick
        run: |
          echo "Aguardando app ficar saudável..."
          for i in $(seq 1 20); do
            STATUS=$(docker compose ps --format json app 2>/dev/null | grep -o '"Health":"[^"]*"' | cut -d'"' -f4)
            if [ "$STATUS" = "healthy" ]; then
              echo "✅ App saudável após ${i} tentativas"
              exit 0
            fi
            echo "  tentativa $i/20 — status: ${STATUS:-starting}"
            sleep 3
          done
          echo "❌ App não ficou saudável em 60s"
          docker compose logs app --tail=30
          exit 1

      - name: Smoke test
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/api/v1/auth/login -X POST \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke@test.com","password":"x"}')
          if [ "$CODE" = "400" ] || [ "$CODE" = "401" ] || [ "$CODE" = "422" ] || [ "$CODE" = "429" ]; then
            echo "✅ Smoke test passou (HTTP $CODE)"
          else
            echo "❌ Smoke test falhou — HTTP $CODE (esperado 400/401/422)"
            exit 1
          fi
