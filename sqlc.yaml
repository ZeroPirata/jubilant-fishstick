version: "2"
sql:
  - schema: "repository/migrations/"
    queries:
      - "repository/query/query.sql"
      - "repository/query/jobs.sql"
      - "repository/query/user.sql"
      - "repository/query/feedback.sql"
      - "repository/query/filters.sql"
      - "repository/query/aliases.sql"
      - "repository/query/worker.sql"
      - "repository/query/security.sql"
    engine: "postgresql"
    gen:
      go:
        package: "db"
        out: "internal/db" 
        emit_json_tags: true
        sql_package: "pgx/v5"