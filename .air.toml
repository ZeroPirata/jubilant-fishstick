root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  entrypoint = "tmp/main"
  cmd = "go build -buildvcs=false -trimpath -o tmp/main ./cmd/server 2>&1"
  delay = 100
  exclude_dir = ["assets", "tmp", "vendor", "testdata", ".git", "node_modules", "data"]
  exclude_regex = ["_test.go"]
  include_ext = ["go", "tpl", "tmpl", "html"]
  kill_delay = "500ms"
  log = "build-errors.log"
  send_interrupt = true
  stop_on_error = false

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true