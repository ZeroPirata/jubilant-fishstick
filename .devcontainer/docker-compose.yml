services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspaces/hackton-treino:cached
    ports:
      - "8080:8080"
    depends_on:
      - db
      - cache
    networks:
      - desafio-network
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@teste.com
      PGADMIN_DEFAULT_PASSWORD: senha123
    ports:
      - "8081:80"
    depends_on:
      - db
    networks:
      - desafio-network
    deploy:
      resources:
        limits:
          memory: 512M

  db:
    image: postgres:17-alpine
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=desafio_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data  
    networks:
      - desafio-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d desafio_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

  cache:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    networks:
      - desafio-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  desafio-network:
    driver: bridge

volumes:
  pgdata: 