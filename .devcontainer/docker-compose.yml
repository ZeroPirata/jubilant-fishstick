version: "3.9"

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      args:
        UID: 1000
    volumes:
      - ..:/workspace:cached
    working_dir: /workspace
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - desafio-network
    mem_limit: 2g
    security_opt:
      - no-new-privileges:true
    stdin_open: true
    tty: true

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@teste.com
      PGADMIN_DEFAULT_PASSWORD: senha123
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - ./data/pgadmin:/var/lib/pgadmin
      - ./data/pgadmin_logs:/var/log/pgadmin
    ports:
      - "8081:80"
    user: "5050"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - desafio-network
    mem_limit: 512m

  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: desafio_db
    ports:
      - "5432:5432"
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data
      - ../repository/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    networks:
      - desafio-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d desafio_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 512m

  cache:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - desafio-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    mem_limit: 256m

networks:
  desafio-network:
    driver: bridge